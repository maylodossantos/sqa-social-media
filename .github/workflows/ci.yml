name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: demo
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run JUnit tests
        working-directory: api
        run: |
          chmod +x mvnw
          ./mvnw clean test

      - name: Run React tests
        working-directory: client
        run: |
          npm install
          npm test -- --watchAll=false

      - name: Run Playwright tests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/demo
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: |
          cd tests && npm install && npx playwright install --with-deps
          cd ../api && ./mvnw spring-boot:run > ../api.log 2>&1 &
          cd ../client && npm start > ../client.log 2>&1 &
          sleep 90
          cd ../tests && npx playwright test

      - name: Show logs
        if: failure()
        run: |
          echo "=== API ===" && cat api.log || true
          echo "=== CLIENT ===" && cat client.log || true